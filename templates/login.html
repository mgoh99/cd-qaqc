<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CD QAQC</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">CD QAQC</div>
      <p class="login-subtitle">Sign in to continue</p>

      {% if success %}
      <div class="alert alert-success" style="margin-bottom: 16px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        {{ success }}
      </div>
      {% endif %}

      {% if error %}
      <div class="alert alert-warning" style="margin-bottom: 16px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <a href="{{ url_for('auth_azure') }}" class="login-btn-microsoft">
        <svg width="16" height="16" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft
      </a>

      <div class="login-divider"><span>or</span></div>

      <form method="POST" action="{{ url_for('login_page') }}">
        <div class="login-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autofocus placeholder="you@company.com" />
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter your password" />
        </div>
        <button type="submit" class="login-btn">Sign In</button>
      </form>
    </div>
  </div>
  <script>
    (function () {
      var hash = window.location.hash.substring(1);
      if (!hash) return;
      var params = new URLSearchParams(hash);
      var accessToken = params.get('access_token');
      if (accessToken) {
        window.location.href = '/auth/callback' + window.location.hash;
      }
    })();
  </script>
</body>
</html>

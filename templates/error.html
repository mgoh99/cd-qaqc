{% extends 'base.html' %}
{% block title %}Error — CD QAQC Tracker{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
  <div class="bg-white rounded-xl border border-red-200 shadow-sm p-8 max-w-lg text-center">
    <h2 class="text-lg font-bold text-red-600 mb-2">Something went wrong</h2>
    <p class="text-sm text-gray-600">{{ message }}</p>
    <a href="/" class="inline-block mt-4 text-sm text-indigo-600 hover:text-indigo-800 transition-colors">Try again</a>
  </div>
</div>
{% endblock %}
